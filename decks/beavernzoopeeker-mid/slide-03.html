<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt;
      height: 405pt;
      font-family: 'Pretendard', sans-serif;
      background: #0F1419;
      padding: 40pt 48pt;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <!-- 헤더 -->
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24pt;">
    <div style="display: flex; align-items: center; gap: 12pt;">
      <p style="display: inline-block; padding: 4pt 10pt; background: #3ECFB4; color: #0F1419; border-radius: 4pt; font-size: 8pt; font-weight: 700;">SOLUTION</p>
      <h2 style="font-size: 22pt; font-weight: 600; color: #F0F4F8;">Beavernzoopeeker</h2>
    </div>
    <p style="font-size: 10pt; color: #556677;">03</p>
  </div>

  <!-- 한 문장 정의 -->
  <p style="font-size: 15pt; color: #3ECFB4; font-weight: 500; margin-bottom: 24pt; line-height: 1.5;">

  </p>

  <!-- 워크플로우 -->
  <div style="flex: 1; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12pt; align-items: start;">
    <div style="text-align: center;">
      <div style="width: 48pt; height: 48pt; background: #1A2332; border-radius: 10pt; margin: 0 auto 10pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 22pt; color: #3ECFB4;">1</p>
      </div>
      <h3 style="font-size: 11pt; font-weight: 600; color: #F0F4F8; margin-bottom: 6pt;">미팅 감지</h3>
      <p style="font-size: 9pt; color: #8899AA; line-height: 1.5;">Google Calendar에서<br>외부 미팅 15분 전<br>자동 감지</p>
    </div>
    <div style="text-align: center;">
      <div style="width: 48pt; height: 48pt; background: #1A2332; border-radius: 10pt; margin: 0 auto 10pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 22pt; color: #3ECFB4;">2</p>
      </div>
      <h3 style="font-size: 11pt; font-weight: 600; color: #F0F4F8; margin-bottom: 6pt;">데이터 통합</h3>
      <p style="font-size: 9pt; color: #8899AA; line-height: 1.5;">Gmail + Notion +<br>Slack + 웹검색<br>컨텍스트 수집</p>
    </div>
    <div style="text-align: center;">
      <div style="width: 48pt; height: 48pt; background: #1A2332; border-radius: 10pt; margin: 0 auto 10pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 22pt; color: #3ECFB4;">3</p>
      </div>
      <h3 style="font-size: 11pt; font-weight: 600; color: #F0F4F8; margin-bottom: 6pt;">AI 브리핑</h3>
      <p style="font-size: 9pt; color: #8899AA; line-height: 1.5;">Claude API로<br>참석자 프로필 +<br>아젠다 + 메일 요약</p>
    </div>
    <div style="text-align: center;">
      <div style="width: 48pt; height: 48pt; background: #1A2332; border-radius: 10pt; margin: 0 auto 10pt; display: flex; align-items: center; justify-content: center;">
        <p style="font-size: 22pt; color: #3ECFB4;">4</p>
      </div>
      <h3 style="font-size: 11pt; font-weight: 600; color: #F0F4F8; margin-bottom: 6pt;">Slack 전달</h3>
      <p style="font-size: 9pt; color: #8899AA; line-height: 1.5;">DM으로 브리핑 전달<br>/brief /mail /ask<br>온디맨드 커맨드</p>
    </div>
  </div>

</body>
</html>
